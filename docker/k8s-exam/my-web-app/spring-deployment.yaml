---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring
  template:
    metadata:
      labels:
        app: spring
    spec:
      containers:
        - name: spring-container
          # 이미 빌드한 Spring Boot 이미지
          image: my-spring-boot-app:1.0
          imagePullPolicy: Never # 로컬 이미지 사용
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: spring-service
spec:
  type: NodePort
  selector:
    app: spring
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081 # NodePort 포트 (30000~32767 범위 내에서 선택)
