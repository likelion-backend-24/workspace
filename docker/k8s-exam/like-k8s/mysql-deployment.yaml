apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
  namespace: myapp # 네임스페이스 지정
spec:
  replicas: 1 # 데이터베이스는 보통 1개만 실행
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            # Secret에서 값 가져오기
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-password
            # ConfigMap에서 값 가져오기
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: mysql-config
                  key: mysql-database
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: mysql-config
                  key: mysql-user
          # 볼륨 마운트
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: myapp # 네임스페이스 지정
spec:
  type: ClusterIP # 클러스터 내부에서만 접근 가능
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
