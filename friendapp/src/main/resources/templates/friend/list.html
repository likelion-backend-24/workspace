<!DOCTYPE html>
<html  xmlns:th="http://www.thymeleaf.org" >
<head>
    <meta charset="UTF-8">
    <title>친구목록보기</title>
</head>
<body>
<h1>친구목록보기</h1>

<table>
    <tr>
        <th>번호</th>
        <th>이름</th>
        <th>이메일</th>
    </tr>
    <tr th:each="friend : ${friends}">
        <td th:text="${friend.id}"></td>
        <td th:text="${friend.name}"></td>
        <td th:text="${friend.email}"></td>
    </tr>
</table>
</body>
</html>
