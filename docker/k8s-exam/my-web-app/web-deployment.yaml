---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web-container
          # 앞서 빌드한 웹 애플리케이션 이미지
          # 로컬 이미지를 사용하려면 imagePullPolicy를 Never로 설정
          image: my-web-app:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          env:
            - name: API_URL
              valueFrom:
                configMapKeyRef:
                  name: web-config
                  key: API_URL
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30088 # (선택) NodePort 지정 (30000~32767 범위)
