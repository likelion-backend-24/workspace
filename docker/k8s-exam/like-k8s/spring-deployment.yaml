apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-deployment
  namespace: myapp # 네임스페이스 지정
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring
  template:
    metadata:
      labels:
        app: spring
    spec:
      containers:
        - name: spring-container
          image: my-spring-boot-app:2.2
          imagePullPolicy: Never # 로컬 이미지 사용
          ports:
            - containerPort: 8080
          env:
            # Secret에서 데이터베이스 연결 정보 주입
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: spring-secret
                  key: spring-datasource-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: spring-secret
                  key: spring-datasource-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spring-secret
                  key: spring-datasource-password
          # 준비 상태 체크 (MySQL 연결 확인)
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          # 생존 상태 체크
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: spring-service
  namespace: myapp # 네임스페이스 지정
spec:
  type: NodePort # 프론트엔드에서만 접근
  selector:
    app: spring
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081
