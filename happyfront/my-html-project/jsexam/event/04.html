<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>event4</title>

  <body>
    <button value="1">클릭</button>
    <button value="2">클릭</button>
    <button value="3">클릭</button>

    <script>
      //   const buttonList = document.getElementsByTagName("button");
      //   //   console.log(button);
      //   buttonList[0].addEventListener("click", () => {
      //     const color = prompt("배경색을 입력해주세요.");
      //     document.body.style.backgroundColor = color;
      //   });

      const button = document.querySelector("button");
      console.log(button);

      const bList = document.querySelectorAll("button");
      console.log(bList);

      button.addEventListener("click", (event) => {
        console.log(event);
        console.log(this); //function 으로 사용했을 때는 이벤트를 발생시킨 (버튼) 이 this,  화살표함수는 Window 객체가 리턴
        console.log(event.target);
      });

      for (let i = 0; i < bList.length; i++) {
        bList[i].addEventListener("click", (e) => {
          console.log(e.target);
          console.log(e.target.value);
        });
      }
    </script>
  </body>
</html>
