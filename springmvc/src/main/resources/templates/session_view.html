<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>세션정보페이지</title>
</head>
<body>
<h1>세션목록보기</h1>
<ul>
     <li th:each="entry:${session}">
         <span th:text="${entry.key}"></span>::: <span th:text="${entry.value}"></span>
         <a th:href="@{/sessionDel(sessionKey=${entry.key})}">삭제</a>
<!--         sessionDel?sessionKey=-->
     </li>
</ul>

<a href="/sessionForm">세션등록</a>
</body>
</html>
